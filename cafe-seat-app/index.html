<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カフェ空席アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>カフェ空席状況アプリ</h1>

  <!-- 新規席追加 -->
  <div id="addSeatContainer">
    <input type="text" id="seatName" placeholder="席名を入力">
    <button id="addSeatBtn">席を追加</button>
  </div>

  <!-- 検索・フィルタ -->
  <div id="controls">
    <input type="text" id="search" placeholder="検索">
    <button id="showAll">全て表示</button>
    <button id="showAvailable">空席のみ表示</button>
  </div>

  <!-- 空席リスト描画 -->
  <ul id="seatList"></ul>

  <script type="module" src="script.js"></script>
</body>
</html>
